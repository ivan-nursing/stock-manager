<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="C區倉存管理系統">
<meta name="theme-color" content="#0b7a8a">
<title>C區倉存管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f4f6f9;--surface:#fff;--surface2:#f9fafb;--offset:#f0f2f5;
  --border:#e2e6ea;--divider:#e9ecef;
  --text:#1a2332;--muted:#6b7a8d;--faint:#b0bac5;
  --primary:#0b7a8a;--primary-h:#085f6d;--primary-hl:#d0eef1;
  --success:#2e7d32;--success-hl:#e8f5e9;
  --warn:#b45309;--warn-hl:#fef3c7;
  --error:#c0392b;--error-hl:#fdecea;
  --info:#1565c0;--info-hl:#e3f2fd;
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --r:8px;--rl:12px;
  --xs:clamp(.7rem,.65rem + .2vw,.8rem);
  --sm:clamp(.8rem,.75rem + .2vw,.9rem);
  --base:clamp(.875rem,.82rem + .2vw,1rem);
  --lg:clamp(1rem,.9rem + .4vw,1.2rem);
  --xl:clamp(1.2rem,1rem + .6vw,1.5rem);
}
[data-theme="dark"]{
  --bg:#131920;--surface:#1c242e;--surface2:#222c38;--offset:#273040;
  --border:#2e3a48;--divider:#253040;
  --text:#d0d8e4;--muted:#8094a8;--faint:#506070;
  --primary:#3fa8b8;--primary-h:#2a8fa0;--primary-hl:#1a3a40;
  --success:#4caf50;--success-hl:#1a2e1a;
  --warn:#f59e0b;--warn-hl:#2e2010;
  --error:#e57373;--error-hl:#2e1a1a;
  --info:#64b5f6;--info-hl:#1a2a3e;
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Noto Sans HK',sans-serif;font-size:var(--base);color:var(--text);background:var(--bg);min-height:100dvh;line-height:1.6}
button{cursor:pointer;font-family:inherit}input,select{font-family:inherit}
table{border-collapse:collapse;width:100%}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:var(--lg);font-weight:700}
.hdr-sub{font-size:var(--xs);color:var(--muted)}
.hdr-actions{display:flex;gap:8px;align-items:center}

/* LAYOUT */
.wrap{max-width:1440px;margin:0 auto;padding:20px}
.grid2{display:grid;grid-template-columns:1fr 340px;gap:20px}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.card-title{font-size:var(--base);font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:18px}

/* STOCK OVERVIEW - big display */
.stock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
@media(max-width:700px){.stock-grid{grid-template-columns:1fr}}
.stock-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:var(--shadow);transition:border-color .2s}
.stock-card.ok{border-color:var(--success)}
.stock-card.warn{border-color:var(--warn)}
.stock-card.danger{border-color:var(--error)}
.stock-brand{font-size:var(--sm);font-weight:700;margin-bottom:2px}
.stock-detail{font-size:var(--xs);color:var(--muted);margin-bottom:10px}
.stock-num{font-size:var(--xl);font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.stock-unit{font-size:var(--xs);color:var(--muted);font-weight:400;margin-left:3px}
.stock-days{font-size:var(--xs);margin-top:6px;font-weight:600}
.stock-days.ok{color:var(--success)}
.stock-days.warn{color:var(--warn)}
.stock-days.danger{color:var(--error)}
.stock-bar-bg{background:var(--offset);border-radius:99px;height:5px;overflow:hidden;margin:8px 0 4px}
.stock-bar{height:100%;border-radius:99px;transition:width .5s}
.bar-ok{background:var(--success)}.bar-warn{background:var(--warn)}.bar-danger{background:var(--error)}
.stock-daily{font-size:var(--xs);color:var(--muted)}
.bonus-tag{display:inline-flex;align-items:center;background:var(--success-hl);color:var(--success);border:1px solid var(--success);border-radius:99px;padding:1px 7px;font-size:var(--xs);font-weight:600;margin-left:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:var(--sm);font-weight:500;border:1px solid transparent;transition:all .15s;line-height:1.4}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-h)}
.btn-secondary{background:var(--surface);border-color:var(--border);color:var(--text)}.btn-secondary:hover{background:var(--offset)}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:4px 10px;font-size:var(--xs)}
.btn-icon{padding:6px;width:30px;height:30px;justify-content:center}
.btn-delivery{background:var(--success);color:#fff;font-weight:700}
.btn-delivery:hover{background:#1b5e20}

/* TABLE */
.tbl-wrap{overflow-x:auto}
th{background:var(--surface2);padding:8px 12px;font-size:var(--xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
td{padding:8px 12px;font-size:var(--sm);border-bottom:1px solid var(--divider);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--offset)}
tr.admitted td{background:color-mix(in srgb,var(--warn-hl) 50%,transparent);opacity:.85}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:var(--xs);font-weight:600}
.b-active{background:var(--success-hl);color:var(--success)}
.b-admitted{background:var(--warn-hl);color:var(--warn)}
.b-order{background:var(--info-hl);color:var(--info)}
.b-delivery{background:var(--success-hl);color:var(--success)}

/* FORM */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.frow{grid-template-columns:1fr}}
.ff{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.ff label{font-size:var(--xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ff input,.ff select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:var(--sm);background:var(--surface);color:var(--text);transition:border-color .15s}
.ff input:focus,.ff select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent)}

/* ALERTS */
.alert{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;border-radius:var(--r);margin-bottom:10px;font-size:var(--sm)}
.a-warn{background:var(--warn-hl);color:var(--warn);border:1px solid var(--warn)}
.a-danger{background:var(--error-hl);color:var(--error);border:1px solid var(--error)}
.a-info{background:var(--info-hl);color:var(--info);border:1px solid var(--info)}
.a-success{background:var(--success-hl);color:var(--success);border:1px solid var(--success)}

/* ORDER BANNER */
.order-banner{background:linear-gradient(135deg,var(--primary-hl),var(--surface));border:2px solid var(--primary);border-radius:var(--rl);padding:14px 18px;margin-bottom:20px}
.order-banner-title{font-weight:700;color:var(--primary);font-size:var(--lg);margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{padding:3px 12px;border-radius:99px;font-size:var(--xs);font-weight:600;color:#fff}
.chip-today{background:var(--error);animation:pulse 2s infinite}
.chip-soon{background:var(--warn)}
.chip-future{background:var(--primary)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .15s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--rl);box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;transform:translateY(12px);transition:transform .2s ease}
.overlay.open .modal{transform:translateY(0)}
.m-hdr{padding:14px 18px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between}
.m-title{font-size:var(--lg);font-weight:700}
.m-body{padding:18px}
.m-foot{padding:10px 18px;border-top:1px solid var(--divider);display:flex;gap:10px;justify-content:flex-end}

/* DELIVERY QUICK BOX */
.delivery-preview{background:var(--success-hl);border:1px solid var(--success);border-radius:var(--r);padding:10px 14px;margin-top:8px;font-size:var(--sm)}
.delivery-preview strong{color:var(--success)}

/* SIDEBAR */
.schedule-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--r);margin-bottom:8px;font-size:var(--sm)}
.si-today{background:var(--error-hl);border:1px solid var(--error)}
.si-soon{background:var(--warn-hl)}
.si-normal{background:var(--offset)}

.theme-btn{background:var(--offset);border:1px solid var(--border);border-radius:99px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.theme-btn:hover{background:var(--border)}

@media(max-width:600px){.wrap{padding:12px}.stock-grid{grid-template-columns:1fr 1fr}}
/* LOGIN SCREEN */
#loginScreen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow-md);padding:40px 32px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-size:2.5rem;margin-bottom:12px;}
.login-title{font-size:var(--xl);font-weight:700;margin-bottom:4px;}
.login-sub{font-size:var(--sm);color:var(--muted);margin-bottom:28px;}
.login-err{background:var(--error-hl);color:var(--error);border:1px solid var(--error);border-radius:var(--r);padding:8px 12px;font-size:var(--sm);margin-bottom:12px;display:none;}

</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>


<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏥</div>
    <div class="login-title">C區倉存管理系統</div>
    <div class="login-sub">請輸入登入資料</div>
    <div class="login-err" id="loginErr">用戶名稱或密碼錯誤</div>
    <div class="ff" style="text-align:left">
      <label>用戶ID</label>
      <input type="text" id="loginUser" placeholder="輸入ID" autocomplete="username"/>
    </div>
    <div class="ff" style="text-align:left;margin-top:8px">
      <label>密碼</label>
      <input type="password" id="loginPass" placeholder="輸入密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;justify-content:center" onclick="doLogin()">登入</button>
  </div>
</div>

<header class="hdr">
  <div class="hdr-logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="var(--primary)"/>
      <rect x="7" y="9" width="22" height="3" rx="1.5" fill="white" opacity=".9"/>
      <rect x="7" y="15" width="15" height="3" rx="1.5" fill="white" opacity=".7"/>
      <rect x="7" y="21" width="18" height="3" rx="1.5" fill="white" opacity=".5"/>
      <circle cx="27" cy="26" r="5" fill="white" opacity=".15"/>
      <path d="M25 26l2 2 3-3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="hdr-title">C區倉存管理系統</div>
      <div class="hdr-sub" id="todayTxt"></div>
    <div style="font-size:var(--xs);color:var(--primary)" id="firebaseStatus">☁️ 連接中...</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="btn btn-delivery btn-sm" onclick="openDeliveryModal()">📦 登記到貨</button>
    <button class="btn btn-secondary btn-sm" onclick="importData()">⬆️ 匯入備份</button>
    <button class="btn btn-secondary btn-sm" onclick="exportData()">⬇️ 匯出備份</button>
    <button class="btn btn-secondary btn-sm" onclick="clearData()">🗑️ 清除資料</button>
    <button class="btn btn-primary btn-sm" onclick="openAddResident()">+ 新增院友</button>
    <button class="theme-btn" data-theme-toggle aria-label="切換主題">🌙</button>
  </div>
</header>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)"/>
<main class="wrap">

  <!-- ORDER BANNER -->
  <div id="orderBanner" class="order-banner" style="display:none">
    <div class="order-banner-title" id="bannerTitle">🗓️ 訂貨提示</div>
    <div id="bannerText"></div>
    <div class="chips" id="bannerChips"></div>
  </div>

  <!-- ALERTS -->
  <div id="alertArea"></div>

  <!-- STOCK OVERVIEW -->
  <div class="stock-grid" id="stockGrid"></div>

  <div class="grid2">
    <div>
      <!-- RESIDENTS TABLE -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">👥 院友奶水記錄</div>
          <span style="font-size:var(--xs);color:var(--muted)" id="lastUpdated"></span>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>院友姓名</th><th>床號</th><th>奶水品牌</th>
              <th>每日支數</th><th>每日奶量</th><th>狀態</th>
              <th>入院日期</th><th>出院日期</th><th>操作</th>
            </tr></thead>
            <tbody id="residentTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- DELIVERY / ORDER LOG -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">📋 訂貨及到貨記錄</div>
          <button class="btn btn-secondary btn-sm" onclick="openOrderLogModal()">+ 新增記錄</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>類型</th><th>日期</th><th>品牌</th>
              <th>箱數</th><th>支數</th><th>贈品</th><th>倉存變化</th><th>備註</th><th></th>
            </tr></thead>
            <tbody id="orderTbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div>
      <!-- QUICK DELIVERY shortcut in sidebar too -->
      <div class="card">
        <div class="card-hdr"><div class="card-title">📦 快速登記到貨</div></div>
        <div class="card-body">
          <p style="font-size:var(--xs);color:var(--muted);margin-bottom:12px">每次收到貨物，輸入箱數後按「確認到貨」，倉存即自動累加。</p>
          <div id="quickDeliveryArea"></div>
        </div>
      </div>

      <!-- ORDER SCHEDULE -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">🗓️ 訂貨日程</div>
          <span style="font-size:var(--xs);color:var(--muted)">每月第1、3星期一</span>
        </div>
        <div class="card-body" style="padding:12px" id="scheduleBody"></div>
      </div>

      <!-- PROJECTION -->
      <div class="card">
        <div class="card-hdr"><div class="card-title">📈 庫存預測</div></div>
        <div class="card-body" id="projectionBody"><p style="color:var(--muted);font-size:var(--sm)">請先新增院友資料</p></div>
      </div>

      <!-- ORDER SUGGESTION -->
      <div class="card">
        <div class="card-hdr"><div class="card-title">📋 建議訂貨量</div></div>
        <div class="card-body" id="suggestionBody"><p style="color:var(--muted);font-size:var(--sm)">請先新增院友資料</p></div>
      </div>
    </div>
  </div>
</main>

<!-- DELIVERY MODAL (main) -->
<div class="overlay" id="deliveryModal">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-title">📦 登記到貨</div>
      <button class="btn btn-secondary btn-sm btn-icon" onclick="closeModal('deliveryModal')">✕</button>
    </div>
    <div class="m-body">
      <div class="frow">
        <div class="ff">
          <label>奶水品牌 *</label>
          <select id="dBrand" onchange="updateDeliveryPreview()">
            <option value="Ultracal">Ultracal</option>
            <option value="Isocal HN">Isocal HN</option>
            <option value="Fresubin">Fresubin ⭐ 買1箱送4支</option>
            <option value="Isosource">Isosource</option>
            <option value="Compleat">Compleat</option>
          </select>
        </div>
        <div class="ff">
          <label>到貨日期 *</label>
          <input type="date" id="dDate"/>
        </div>
      </div>
      <div class="ff">
        <label>收到箱數 *</label>
        <input type="number" id="dBoxes" min="1" value="1" oninput="updateDeliveryPreview()"/>
      </div>
      <div id="deliveryPreview" class="delivery-preview"></div>
      <div class="ff" style="margin-top:12px">
        <label>備註（選填）</label>
        <input type="text" id="dNote" placeholder="例：供應商、批次號…"/>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn btn-secondary" onclick="closeModal('deliveryModal')">取消</button>
      <button class="btn btn-delivery" onclick="confirmDelivery()">✅ 確認到貨，累加倉存</button>
    </div>
  </div>
</div>

<!-- ORDER LOG MODAL (manual record) -->
<div class="overlay" id="orderLogModal">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-title" id="orderLogTitle">新增訂貨記錄</div>
      <button class="btn btn-secondary btn-sm btn-icon" onclick="closeModal('orderLogModal')">✕</button>
    </div>
    <div class="m-body">
      <div class="frow">
        <div class="ff">
          <label>類型 *</label>
          <select id="olType">
            <option value="order">📋 訂貨（已落單）</option>
            <option value="delivery">📦 到貨（已收貨，累加倉存）</option>
          </select>
        </div>
        <div class="ff">
          <label>奶水品牌 *</label>
          <select id="olBrand" onchange="updateOLPreview()">
            <option value="Ultracal">Ultracal</option>
            <option value="Isocal HN">Isocal HN</option>
            <option value="Fresubin">Fresubin ⭐ 買1箱送4支</option>
            <option value="Isosource">Isosource</option>
            <option value="Compleat">Compleat</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="ff">
          <label>日期 *</label>
          <input type="date" id="olDate"/>
        </div>
        <div class="ff">
          <label>箱數 *</label>
          <input type="number" id="olBoxes" min="1" value="1" oninput="updateOLPreview()"/>
        </div>
      </div>
      <div id="olPreview" class="delivery-preview" style="display:none"></div>
      <div class="ff" style="margin-top:12px">
        <label>備註（選填）</label>
        <input type="text" id="olNote"/>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn btn-secondary" onclick="closeModal('orderLogModal')">取消</button>
      <button class="btn btn-primary" onclick="saveOrderLog()">儲存記錄</button>
    </div>
  </div>
</div>

<!-- RESIDENT MODAL -->
<div class="overlay" id="residentModal">
  <div class="modal">
    <div class="m-hdr">
      <div class="m-title" id="residentModalTitle">新增院友</div>
      <button class="btn btn-secondary btn-sm btn-icon" onclick="closeModal('residentModal')">✕</button>
    </div>
    <div class="m-body">
      <input type="hidden" id="editRId"/>
      <div class="frow">
        <div class="ff"><label>院友姓名 *</label><input type="text" id="rName" placeholder="例：陳大文"/></div>
        <div class="ff"><label>床號</label><input type="text" id="rBed" placeholder="例：A01"/></div>
      </div>
      <div class="frow">
        <div class="ff">
          <label>奶水品牌 *</label>
          <select id="rBrand" onchange="updateRPreview()">

        <div class="ff"><label>出院日期（如已出院）</label><input type="date" id="rDischarge"/></div>

</div>

<script>

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAF5EU0i4iVN_5zC7vvwsqediY_U59540I",
  authDomain: "ng-tube-manager.firebaseapp.com",
  databaseURL: "https://ng-tube-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ng-tube-manager",
  storageBucket: "ng-tube-manager.firebasestorage.app",
  messagingSenderId: "771151519253",
  appId: "1:771151519253:web:d2a3b4635d388f054af81c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const DB_PATH = 'ng_tube_data';

let isSyncing = false;

function pushToFirebase() {
  if (isSyncing) return;
  const data = { residents, logs, stock, safety, nid, updatedAt: Date.now() };
  db.ref(DB_PATH).set(data).catch(e => console.warn('Firebase write error:', e));
}

function listenFirebase() {
  db.ref(DB_PATH).on('value', snapshot => {
    const data = snapshot.val();
    if (!data) return;
    isSyncing = true;
    residents = Array.isArray(data.residents) ? data.residents : residents;
    logs = Array.isArray(data.logs) ? data.logs : logs;
    stock = data.stock ? {Ultracal:0,'Isocal HN':0,Fresubin:0,Isosource:0,Compleat:0,...data.stock} : stock;
    safety = data.safety ? {Ultracal:48,'Isocal HN':48,Fresubin:48,Isosource:48,Compleat:48,...data.safety} : safety;
    nid = Number.isFinite(data.nid) ? data.nid : nid;
    saveState();
    renderAll();
    showSyncBadge();
    isSyncing = false;
  });
}

function updateFirebaseStatus(ok) {
  const el = document.getElementById('firebaseStatus');
  if (el) { el.textContent = ok ? '☁️ 已連接 Firebase' : '⚠️ 離線模式'; el.style.color = ok ? 'var(--success)' : 'var(--warn)'; }
}
db.ref('.info/connected').on('value', snap => updateFirebaseStatus(snap.val() === true));

function showSyncBadge() {
  const existing = document.getElementById('syncBadge');
  if (existing) existing.remove();
  const badge = document.createElement('div');
  badge.id = 'syncBadge';
  badge.style.cssText = 'position:fixed;bottom:20px;left:20px;z-index:9999;background:#2e7d32;color:#fff;padding:6px 14px;border-radius:99px;font-size:0.8rem;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2);';
  badge.textContent = '☁️ 已同步';
  document.body.appendChild(badge);
  setTimeout(() => badge.remove(), 2500);
}

// ─── BRAND CONFIG ─────────────────────────────────────────────────────────────
const BRANDS = {
  "Ultracal":  {ml:250, perBox:24, bonus:0,  color:"#0b7a8a"},
  "Isocal HN": {ml:250, perBox:24, bonus:0,  color:"#1565c0"},
  "Fresubin":  {ml:200, perBox:24, bonus:4,  color:"#2e7d32"},
  "Isosource": {ml:250, perBox:24, bonus:0,  color:"#b45309"},
  "Compleat":  {ml:250, perBox:24, bonus:0,  color:"#7b1fa2"}
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let residents = [];
let logs = []; // all order/delivery records
let stock = {Ultracal:0,"Isocal HN":0,Fresubin:0,Isosource:0,Compleat:0};
let safety = {Ultracal:48,"Isocal HN":48,Fresubin:48,Isosource:48,Compleat:48};
let nid = 1;

const STORAGE_KEY = 'ng_tube_formula_manager_v3';

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ residents, logs, stock, safety, nid })); } catch (e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    residents = Array.isArray(data.residents) ? data.residents : residents;
    logs = Array.isArray(data.logs) ? data.logs : logs;
    stock = data.stock && typeof data.stock === 'object' ? {Ultracal:0,'Isocal HN':0,Fresubin:0,Isosource:0,Compleat:0, ...data.stock} : stock;
    safety = data.safety && typeof data.safety === 'object' ? {Ultracal:48,'Isocal HN':48,Fresubin:48,Isosource:48,Compleat:48, ...data.safety} : safety;
    nid = Number.isFinite(data.nid) ? data.nid : nid;
  } catch (e) {}
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function(){
  const today = new Date();
  document.getElementById('todayTxt').textContent =
    today.toLocaleDateString('zh-HK',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  // theme
  const btn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  root.setAttribute('data-theme',theme);
  btn.textContent = theme==='dark'?'☀️':'🌙';
  btn.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';root.setAttribute('data-theme',theme);btn.textContent=theme==='dark'?'☀️':'🌙';});
  // default dates
  const td = today.toISOString().split('T')[0];
  document.getElementById('dDate').value = td;
  document.getElementById('olDate').value = td;
  loadState();
  listenFirebase();
  updateDeliveryPreview();
  updateOLPreview();
  renderAll();
  setInterval(renderAll,60000);
})();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function parseD(s){if(!s)return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d;}
function isAdmitted(r){
  const t=today0(), admit=parseD(r.admitDate), disch=parseD(r.dischargeDate);
  if(!admit||admit>t)return false;
  if(disch&&disch<=t)return false;
  return true;
}
function activeResidents(){return residents.filter(r=>!isAdmitted(r));}
function dailyByBrand(){
  const res={};Object.keys(BRANDS).forEach(b=>res[b]=0);
  activeResidents().forEach(r=>{if(BRANDS[r.brand])res[r.brand]+=(r.units||0);});
  return res;
}
function daysLeft(brand){
  const d=dailyByBrand()[brand];
  return d<=0?Infinity:Math.floor(stock[brand]/d);
}
function fmtDate(s){return new Date(s+'T00:00:00').toLocaleDateString('zh-HK',{year:'numeric',month:'short',day:'numeric'});}

// ─── ORDER SCHEDULE ───────────────────────────────────────────────────────────
function orderMondays(year,month){
  const res=[];let cnt=0;
  for(let d=1;d<=31;d++){const dt=new Date(year,month,d);if(dt.getMonth()!==month)break;if(dt.getDay()===1){cnt++;if(cnt===1||cnt===3)res.push(new Date(dt));}}
  return res;
}
function upcomingOrderDays(n=3){
  const t=today0();const res=[];
  for(let m=0;m<n;m++){const base=new Date(t.getFullYear(),t.getMonth()+m,1);orderMondays(base.getFullYear(),base.getMonth()).forEach(d=>{if(d>=t)res.push(d);});}
  return res;
}
function nthLabel(date){
  const ms=orderMondays(date.getFullYear(),date.getMonth());
  return ms.findIndex(d=>d.getTime()===date.getTime())===0?'第1星期一':'第3星期一';
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll(){
  renderStockGrid();
  renderResidentTable();
  renderOrderTable();
  renderBanner();
  renderAlerts();
  renderSchedule();
  renderProjection();
  renderSuggestion();
  renderQuickDelivery();
  document.getElementById('lastUpdated').textContent='更新：'+new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
}

// ─── STOCK GRID ───────────────────────────────────────────────────────────────
function renderStockGrid(){
  const grid=document.getElementById('stockGrid');
  const daily=dailyByBrand();
  grid.innerHTML='';
  Object.entries(BRANDS).forEach(([brand,cfg])=>{
    const s=stock[brand], d=daily[brand], days=daysLeft(brand), sf=safety[brand];
    const maxS=Math.max(s,sf*2,10);
    const pct=Math.min(100,Math.round(s/maxS*100));
    const status=s<=sf?'danger':days<14?'warn':'ok';
    const barClass='bar-'+status;
    const daysClass=days<7?'danger':days<14?'warn':'ok';
    // residents using this brand (active only)
    const users=activeResidents().filter(r=>r.brand===brand);
    const admitted=residents.filter(r=>r.brand===brand&&isAdmitted(r));
    const div=document.createElement('div');
    div.className='stock-card '+status;

    // Build resident list
    let userListHtml='';
    if(users.length===0&&admitted.length===0){
      userListHtml='<div style="font-size:var(--xs);color:var(--muted);font-style:italic">暫無院友使用</div>';
    } else {
      if(users.length>0){
        userListHtml+=users.map(u=>`<div style="display:flex;justify-content:space-between;font-size:var(--xs);padding:2px 0;border-bottom:1px solid var(--divider)">
          <span>👤 ${u.name}${u.bed?' <span style=\'color:var(--muted)\'>('+u.bed+')</span>':''}</span>
          <span style="font-variant-numeric:tabular-nums;color:${cfg.color}">${u.units}支/日</span>
        </div>`).join('');
      }
      if(admitted.length>0){
        userListHtml+=admitted.map(u=>`<div style="display:flex;justify-content:space-between;font-size:var(--xs);padding:2px 0;border-bottom:1px solid var(--divider);opacity:.6">
          <span>🏥 ${u.name} <span style="color:var(--warn)">(住院中)</span></span>
          <span style="color:var(--muted)">${u.units}支/日 暫停</span>
        </div>`).join('');
      }
    }

    div.innerHTML=`
      <div class="stock-brand" style="color:${cfg.color}">${brand}${cfg.bonus>0?'<span class="bonus-tag">⭐送'+cfg.bonus+'支/箱</span>':''}</div>
      <div class="stock-detail">${cfg.ml}ml/支 · 24支/箱</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin:6px 0 2px">
        <span class="stock-num" style="color:${cfg.color}">${s}</span>
        <span class="stock-unit">支現存</span>
      </div>
      <div class="stock-bar-bg"><div class="stock-bar ${barClass}" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="stock-daily">每日消耗：<strong>${d} 支</strong></div>
        <div class="stock-days ${daysClass}" style="margin-top:0">${days===Infinity?'—':days+' 日'}</div>
      </div>
      <div style="background:var(--offset);border-radius:6px;padding:6px 8px;margin-bottom:8px">
        <div style="font-size:var(--xs);font-weight:600;color:var(--muted);margin-bottom:4px">使用院友 (${users.length} 人在院${admitted.length>0?'，'+admitted.length+'人住院':''})：</div>
        ${userListHtml}
      </div>
      <div style="font-size:var(--xs);color:var(--muted);display:flex;align-items:center;gap:6px">
        安全水平：
        <input type="number" min="0" value="${sf}" onchange="updateSafety('${brand}',this.value)"
          style="width:48px;padding:1px 4px;border:1px solid var(--border);border-radius:4px;font-size:var(--xs);background:var(--surface);color:var(--text)"/> 支
      </div>
    `;
    grid.appendChild(div);
  });
}

function updateSafety(brand,val){safety[brand]=Math.max(0,parseFloat(val)||0);renderAll();}

// ─── RESIDENT TABLE ───────────────────────────────────────────────────────────
function renderResidentTable(){
  const tbody=document.getElementById('residentTbody');
  if(!residents.length){
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--muted)">暫無院友記錄，請點擊「新增院友」</td></tr>';
    return;
  }
  tbody.innerHTML='';
  residents.forEach(r=>{
    const admitted=isAdmitted(r);
    const cfg=BRANDS[r.brand]||{ml:250};
    const mlDay=r.units*cfg.ml;
    const tr=document.createElement('tr');
    if(admitted)tr.className='admitted';
    tr.innerHTML=`
      <td><strong>${r.name}</strong>${r.note?`<br><small style="color:var(--muted)">${r.note}</small>`:''}</td>
      <td>${r.bed||'—'}</td>
      <td><span style="font-weight:600;color:${BRANDS[r.brand]?.color||'inherit'}">${r.brand}</span></td>
      <td style="font-variant-numeric:tabular-nums">${r.units} 支</td>
      <td style="font-variant-numeric:tabular-nums">${mlDay} ml</td>
      <td>${admitted?'<span class="badge b-admitted">🏥 住院中</span>':'<span class="badge b-active">✅ 在院</span>'}</td>
      <td>${r.admitDate
        ?`<input type="date" value="${r.admitDate}" onchange="setRDate(${r.id},'admitDate',this.value)" style="border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-size:var(--xs);background:var(--surface);color:var(--text)">`
        :`<button class="btn btn-secondary btn-sm" onclick="quickDate(${r.id},'admitDate')">設入院</button>`}</td>
      <td>${r.dischargeDate
        ?`<input type="date" value="${r.dischargeDate}" onchange="setRDate(${r.id},'dischargeDate',this.value)" style="border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-size:var(--xs);background:var(--surface);color:var(--text)">`
        :(admitted?`<button class="btn btn-success btn-sm" onclick="quickDate(${r.id},'dischargeDate')">設出院</button>`:'—')}</td>
      <td><div style="display:flex;gap:4px">
        <button class="btn btn-secondary btn-sm btn-icon" onclick="editResident(${r.id})">✏️</button>
        <button class="btn btn-secondary btn-sm btn-icon" onclick="delResident(${r.id})" style="color:var(--error)">🗑️</button>
      </div></td>
    `;
    tbody.appendChild(tr);
  });
}

// ─── ORDER TABLE ──────────────────────────────────────────────────────────────
function renderOrderTable(){
  const tbody=document.getElementById('orderTbody');
  if(!logs.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--muted)">暫無記錄</td></tr>';return;}
  tbody.innerHTML='';
  [...logs].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(o=>{
    const cfg=BRANDS[o.brand];
    const bonus=o.boxes*(cfg?.bonus||0);
    const netUnits=o.units+bonus;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="badge ${o.type==='delivery'?'b-delivery':'b-order'}">${o.type==='delivery'?'📦 到貨':'📋 訂貨'}</span></td>
      <td style="font-variant-numeric:tabular-nums">${fmtDate(o.date)}</td>
      <td style="font-weight:600;color:${BRANDS[o.brand]?.color||'inherit'}">${o.brand}</td>
      <td>${o.boxes} 箱</td>
      <td style="font-variant-numeric:tabular-nums">${o.units} 支</td>
      <td>${bonus>0?`<span class="bonus-tag">+${bonus}</span>`:'—'}</td>
      <td style="font-variant-numeric:tabular-nums;font-size:var(--xs);color:${o.type==='delivery'?'var(--success)':'var(--muted)'}">${o.type==='delivery'?'＋'+netUnits+' 支入倉':'—'}</td>
      <td style="color:var(--muted)">${o.note||'—'}</td>
      <td><button class="btn btn-secondary btn-sm btn-icon" onclick="delLog(${o.id})" style="color:var(--error)">🗑️</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// ─── QUICK DELIVERY SIDEBAR ───────────────────────────────────────────────────
function renderQuickDelivery(){
  const area=document.getElementById('quickDeliveryArea');
  area.innerHTML='';
  Object.entries(BRANDS).forEach(([brand,cfg])=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px;background:var(--offset);border-radius:var(--r);margin-bottom:8px';
    const inputId='qd_'+brand.replace(/\s/g,'_');
    row.innerHTML=`
      <span style="font-size:var(--sm);font-weight:600;color:${cfg.color};min-width:80px">${brand}</span>
      <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end">
        <input type="number" id="${inputId}" min="1" value="1" style="width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--r);font-size:var(--sm);background:var(--surface);color:var(--text);text-align:center"/> 箱
        <button class="btn btn-delivery btn-sm" onclick="quickDelivery('${brand}','${inputId}')">到貨 +</button>
      </div>
    `;
    area.appendChild(row);
  });
}

function quickDelivery(brand, inputId){
  const boxes=parseFloat(document.getElementById(inputId).value)||0;
  if(boxes<=0){alert('請輸入有效箱數');return;}
  const cfg=BRANDS[brand];
  const units=boxes*cfg.perBox;
  const bonus=boxes*cfg.bonus;
  const net=units+bonus;
  const before=stock[brand];
  stock[brand]+=net;
  const today=new Date().toISOString().split('T')[0];
  logs.push({id:nid++,type:'delivery',brand,date:today,boxes,units,note:`快速登記，倉存：${before}→${stock[brand]}`});
  document.getElementById(inputId).value=1;
  renderAll();
  // flash success
  const msg=document.createElement('div');
  msg.className='alert a-success';
  msg.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;min-width:260px;box-shadow:var(--shadow-md)';
  msg.innerHTML=`✅ <strong>${brand}</strong> 到貨 ${boxes} 箱（${net} 支）已入倉，現有 <strong>${stock[brand]} 支</strong>`;
  document.body.appendChild(msg);
  setTimeout(()=>msg.remove(),3500);
}

// ─── BANNER & ALERTS ─────────────────────────────────────────────────────────
function renderBanner(){
  const t=today0(), upcoming=upcomingOrderDays(2);
  const banner=document.getElementById('orderBanner');
  const todayOnes=upcoming.filter(d=>d.getTime()===t.getTime());
  const soonOnes=upcoming.filter(d=>{const diff=Math.round((d-t)/86400000);return diff>0&&diff<=3;});
  if(todayOnes.length){
    banner.style.display='';
    document.getElementById('bannerTitle').textContent='🚨 今天是訂貨日！';
    document.getElementById('bannerText').innerHTML='<strong>請今天下單訂購配方奶水。</strong> 可參考右側建議訂貨量。';
    document.getElementById('bannerChips').innerHTML=todayOnes.map(d=>`<span class="chip chip-today">今日 ${d.toLocaleDateString('zh-HK',{month:'long',day:'numeric'})}</span>`).join('');
  } else if(soonOnes.length){
    banner.style.display='';
    document.getElementById('bannerTitle').textContent='🗓️ 訂貨日即將到來';
    document.getElementById('bannerText').textContent='請提前準備訂貨資料。';
    document.getElementById('bannerChips').innerHTML=soonOnes.map(d=>{const diff=Math.round((d-t)/86400000);return`<span class="chip chip-soon">${d.toLocaleDateString('zh-HK',{month:'long',day:'numeric',weekday:'short'})} (${diff}日後)</span>`;}).join('');
  } else banner.style.display='none';
}

function renderAlerts(){
  const area=document.getElementById('alertArea');
  area.innerHTML='';
  const admitted=residents.filter(r=>isAdmitted(r));
  if(admitted.length) area.innerHTML+=`<div class="alert a-info">🏥 <div><strong>${admitted.length} 名院友住院中</strong>（${admitted.map(r=>r.name).join('、')}），奶水消耗已暫停計算。</div></div>`;
  const daily=dailyByBrand();
  Object.keys(BRANDS).forEach(brand=>{
    const days=daysLeft(brand), s=stock[brand], sf=safety[brand], d=daily[brand];
    if(d>0&&s<=sf) area.innerHTML+=`<div class="alert a-warn">⚠️ <div><strong>${brand}</strong> 倉存 ${s} 支，低於安全水平 ${sf} 支，請盡快訂貨。</div></div>`;
    if(d>0&&days<7&&days!==Infinity) area.innerHTML+=`<div class="alert a-danger">🔴 <div><strong>${brand}</strong> 只剩 <strong>${days} 日</strong>存量，請立即訂貨！</div></div>`;
  });
}

// ─── SCHEDULE ────────────────────────────────────────────────────────────────
function renderSchedule(){
  const body=document.getElementById('scheduleBody'), t=today0(), upcoming=upcomingOrderDays(3);
  body.innerHTML='';
  upcoming.slice(0,6).forEach(day=>{
    const diff=Math.round((day-t)/86400000);
    const cls=diff===0?'si-today':diff<=3?'si-soon':'si-normal';
    const item=document.createElement('div');
    item.className='schedule-item '+cls;
    item.innerHTML=`<span>${day.toLocaleDateString('zh-HK',{month:'long',day:'numeric',weekday:'short'})} <small style="color:var(--muted)">${nthLabel(day)}</small></span>
      <span class="badge ${diff===0?'b-admitted':diff<=3?'b-admitted':'b-active'}">${diff===0?'今天!':diff+'日後'}</span>`;
    body.appendChild(item);
  });
}

// ─── PROJECTION ──────────────────────────────────────────────────────────────
function renderProjection(){
  const body=document.getElementById('projectionBody'), daily=dailyByBrand();
  if(!Object.values(daily).some(v=>v>0)){body.innerHTML='<p style="color:var(--muted);font-size:var(--sm)">請先新增院友資料</p>';return;}
  const t=today0(), upcoming=upcomingOrderDays(2).slice(0,3);
  let html='';
  upcoming.forEach(orderDay=>{
    const diff=Math.round((orderDay-t)/86400000);
    html+=`<div style="margin-bottom:12px"><div style="font-size:var(--xs);font-weight:600;color:var(--muted);margin-bottom:4px">${orderDay.toLocaleDateString('zh-HK',{month:'short',day:'numeric'})} 訂貨日前（${diff}日後）</div>`;
    Object.keys(BRANDS).forEach(brand=>{
      const d=daily[brand]; if(d<=0)return;
      const proj=Math.max(0,stock[brand]-d*diff);
      const sf=safety[brand];
      const color=proj<=sf?'var(--error)':proj<=sf*1.5?'var(--warn)':'var(--success)';
      html+=`<div style="display:flex;justify-content:space-between;font-size:var(--xs);padding:3px 0;border-bottom:1px solid var(--divider)">
        <span style="color:${BRANDS[brand].color};font-weight:600">${brand}</span>
        <span style="font-variant-numeric:tabular-nums;color:${color};font-weight:700">${proj} 支</span>
      </div>`;
    });
    html+='</div>';
  });
  body.innerHTML=html;
}

// ─── SUGGESTION ───────────────────────────────────────────────────────────────
function renderSuggestion(){
  const body=document.getElementById('suggestionBody'), daily=dailyByBrand();
  if(!Object.values(daily).some(v=>v>0)){body.innerHTML='<p style="color:var(--muted);font-size:var(--sm)">請先新增院友資料</p>';return;}
  const targetDays=28;
  let html='<div style="font-size:var(--xs);color:var(--muted);margin-bottom:10px">建議維持 28 日存量</div>';
  Object.entries(BRANDS).forEach(([brand,cfg])=>{
    const d=daily[brand]; if(d<=0)return;
    const needed=d*targetDays, shortfall=Math.max(0,needed-stock[brand]);
    if(shortfall<=0){
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--success-hl);border-radius:var(--r);margin-bottom:8px;font-size:var(--sm)">
        <span style="color:${cfg.color};font-weight:600">${brand}</span><span style="color:var(--success)">✅ 充足</span></div>`;
      return;
    }
    const boxes=Math.ceil(shortfall/cfg.perBox);
    const units=boxes*cfg.perBox, bonus=boxes*cfg.bonus, net=units+bonus;
    html+=`<div style="padding:8px 10px;background:var(--offset);border-radius:var(--r);margin-bottom:8px;font-size:var(--sm)">
      <div style="display:flex;justify-content:space-between"><span style="color:${cfg.color};font-weight:700">${brand}</span><span style="font-weight:700">建議訂 ${boxes} 箱</span></div>
      <div style="font-size:var(--xs);color:var(--muted);margin-top:2px">
        需補 ${shortfall} 支 → ${boxes}箱×${cfg.perBox} = ${units}支${bonus>0?` <span class="bonus-tag">+${bonus}贈品</span> 實收${net}支`:''}
      </div></div>`;
  });
  body.innerHTML=html;
}

// ─── DELIVERY MODAL PREVIEW ───────────────────────────────────────────────────
function updateDeliveryPreview(){
  const brand=document.getElementById('dBrand').value;
  const boxes=parseFloat(document.getElementById('dBoxes').value)||0;
  const cfg=BRANDS[brand]; if(!cfg)return;
  const units=boxes*cfg.perBox, bonus=boxes*cfg.bonus, net=units+bonus;
  const before=stock[brand];
  document.getElementById('deliveryPreview').innerHTML=
    `<strong>${boxes}</strong> 箱 × ${cfg.perBox} 支 = <strong>${units} 支</strong>`+
    (bonus>0?` + <span class="bonus-tag">贈品 +${bonus} 支</span> = <strong>${net} 支實收</strong>`:'') +
    `<br>倉存變化：<strong>${before}</strong> 支 → <strong style="color:var(--success)">${before+net}</strong> 支`;
}

function updateOLPreview(){
  const brand=document.getElementById('olBrand').value;
  const boxes=parseFloat(document.getElementById('olBoxes').value)||0;
  const cfg=BRANDS[brand]; if(!cfg)return;
  const units=boxes*cfg.perBox, bonus=boxes*cfg.bonus, net=units+bonus;
  const before=stock[brand];
  const isDelivery=document.getElementById('olType').value==='delivery';
  const prev=document.getElementById('olPreview');
  prev.style.display='';
  prev.innerHTML=
    `<strong>${boxes}</strong> 箱 = <strong>${units} 支</strong>${bonus>0?` <span class="bonus-tag">+${bonus}贈品</span> 實收<strong>${net}支</strong>`:''}` +
    (isDelivery?`<br>到貨後倉存：<strong>${before}</strong> → <strong style="color:var(--success)">${before+net}</strong> 支`:'');
}

function confirmDelivery(){
  const brand=document.getElementById('dBrand').value;
  const date=document.getElementById('dDate').value;
  const boxes=parseFloat(document.getElementById('dBoxes').value);
  if(!date){alert('請選擇日期');return;}
  if(!boxes||boxes<=0){alert('請輸入有效箱數');return;}
  const cfg=BRANDS[brand];
  const units=boxes*cfg.perBox, bonus=boxes*cfg.bonus, net=units+bonus;
  stock[brand]+=net;
  logs.push({id:nid++,type:'delivery',brand,date,boxes,units,bonus,note:document.getElementById('dNote').value.trim()});
  closeModal('deliveryModal');
  renderAll();
  saveState();
  pushToFirebase();
}

function saveOrderLog(){
  const type=document.getElementById('olType').value;
  const brand=document.getElementById('olBrand').value;
  const date=document.getElementById('olDate').value;
  const boxes=parseFloat(document.getElementById('olBoxes').value);
  if(!date){alert('請選擇日期');return;}
  if(!boxes||boxes<=0){alert('請輸入有效箱數');return;}
  const cfg=BRANDS[brand];
  const units=boxes*cfg.perBox, bonus=boxes*cfg.bonus, net=units+bonus;
  if(type==='delivery') stock[brand]+=net;
  logs.push({id:nid++,type,brand,date,boxes,units,bonus,note:document.getElementById('olNote').value.trim()});
  closeModal('orderLogModal');
  renderAll();
  saveState();
  pushToFirebase();
}

// ─── RESIDENT CRUD ────────────────────────────────────────────────────────────
function openAddResident(){
  document.getElementById('residentModalTitle').textContent='新增院友';
  document.getElementById('editRId').value='';
  ['rName','rBed','rNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rUnits').value='';
  document.getElementById('rBrand').value='Ultracal';
  document.getElementById('rAdmit').value='';
  document.getElementById('rDischarge').value='';
  document.getElementById('rPreview').style.display='none';
  openModal('residentModal');
  setTimeout(()=>document.getElementById('rName').focus(),100);
}
function editResident(id){
  const r=residents.find(x=>x.id===id);if(!r)return;
  document.getElementById('residentModalTitle').textContent='編輯院友 — '+r.name;
  document.getElementById('editRId').value=id;
  document.getElementById('rName').value=r.name;
  document.getElementById('rBed').value=r.bed||'';
  document.getElementById('rBrand').value=r.brand;
  document.getElementById('rUnits').value=r.units;
  document.getElementById('rAdmit').value=r.admitDate||'';
  document.getElementById('rDischarge').value=r.dischargeDate||'';
  document.getElementById('rNote').value=r.note||'';
  updateRPreview();
  openModal('residentModal');
}
function saveResident(){
  const name=document.getElementById('rName').value.trim();
  const units=parseFloat(document.getElementById('rUnits').value);
  const brand=document.getElementById('rBrand').value;
  if(!name){alert('請輸入院友姓名');return;}
  if(!units||units<=0){alert('請輸入有效每日支數');return;}
  const data={name,brand,units,bed:document.getElementById('rBed').value.trim(),admitDate:document.getElementById('rAdmit').value||null,dischargeDate:document.getElementById('rDischarge').value||null,note:document.getElementById('rNote').value.trim()};
  const eid=document.getElementById('editRId').value;
  if(eid){const idx=residents.findIndex(r=>r.id===parseInt(eid));if(idx>=0)residents[idx]={...residents[idx],...data};}
  else residents.push({id:nid++,...data});
  closeModal('residentModal');renderAll();saveState();
}
function delResident(id){
  const r=residents.find(x=>x.id===id);
  if(r&&confirm(`確定刪除院友「${r.name}」？`)){residents=residents.filter(x=>x.id!==id);renderAll();}
}
function setRDate(id,field,val){const r=residents.find(x=>x.id===id);if(r){r[field]=val||null;renderAll();}}
function quickDate(id,field){
  const td=new Date().toISOString().split('T')[0];
  const label=field==='admitDate'?'入院日期':'出院日期';
  const date=prompt(`請輸入${label} (YYYY-MM-DD)：`,td);
  if(date)setRDate(id,field,date);
}
function updateRPreview(){
  const brand=document.getElementById('rBrand').value;
  const units=parseFloat(document.getElementById('rUnits').value)||0;
  const cfg=BRANDS[brand];
  const prev=document.getElementById('rPreview');
  if(!cfg||units<=0){prev.style.display='none';return;}
  prev.style.display='';
  prev.textContent=`每日 ${units} 支 × ${cfg.ml}ml = ${units*cfg.ml}ml`;
}
function delLog(id){
  if(!confirm('確定刪除此記錄？'))return;
  const o=logs.find(x=>x.id===id);
  if(o&&o.type==='delivery'){
    const cfg=BRANDS[o.brand];
    const net=o.units+(o.bonus||0);
    stock[o.brand]=Math.max(0,(stock[o.brand]||0)-net);
  }
  logs=logs.filter(x=>x.id!==id);renderAll();
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openDeliveryModal(){
  document.getElementById('dDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('dBoxes').value=1;
  document.getElementById('dNote').value='';
  updateDeliveryPreview();openModal('deliveryModal');
}
function openOrderLogModal(){
  document.getElementById('olDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('olBoxes').value=1;
  document.getElementById('olNote').value='';
  updateOLPreview();openModal('orderLogModal');
}
document.querySelectorAll('.overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(el=>el.classList.remove('open'));});
document.getElementById('rBrand').addEventListener('change',updateRPreview);
function exportData(){
  saveState();
  const data = localStorage.getItem(STORAGE_KEY) || '{}';
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ng-tube-formula-data.json'; a.click(); URL.revokeObjectURL(url);
}
function clearData(){
  if(confirm('確定清除所有本地資料？此操作無法復原。')){
    localStorage.removeItem(STORAGE_KEY);
    residents=[]; logs=[]; stock={Ultracal:0,'Isocal HN':0,Fresubin:0,Isosource:0,Compleat:0}; safety={Ultracal:48,'Isocal HN':48,Fresubin:48,Isosource:48,Compleat:48}; nid=1;
    renderAll();
  }
}
function importData(){
  document.getElementById('importInput').click();
}
function handleImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.residents && !data.logs && !data.stock){ alert('格式不正確，請使用系統匯出嘅 JSON 檔案。'); return; }
      residents = Array.isArray(data.residents) ? data.residents : residents;
      logs = Array.isArray(data.logs) ? data.logs : logs;
      stock = data.stock && typeof data.stock === 'object' ? {Ultracal:0,'Isocal HN':0,Fresubin:0,Isosource:0,Compleat:0,...data.stock} : stock;
      safety = data.safety && typeof data.safety === 'object' ? {Ultracal:48,'Isocal HN':48,Fresubin:48,Isosource:48,Compleat:48,...data.safety} : safety;
      nid = Number.isFinite(data.nid) ? data.nid : nid;
      saveState();
      renderAll();
      // toast
      const msg = document.createElement('div');
      msg.className='alert a-success';
      msg.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;min-width:260px;box-shadow:var(--shadow-md)';
      msg.innerHTML='✅ 資料匯入成功！院友及倉存資料已載入。';
      document.body.appendChild(msg);
      setTimeout(()=>msg.remove(),3500);
    } catch(err){ alert('匯入失敗：' + err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}
document.getElementById('olType').addEventListener('change',updateOLPreview);

const VALID_USER = 'ivan';
const VALID_PASS = '1234';
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(u===VALID_USER && p===VALID_PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('loginUser').value='';
    document.getElementById('loginPass').value='';
  } else {
    const err=document.getElementById('loginErr');
    err.style.display='block';
    setTimeout(()=>err.style.display='none',3000);
  }
}
